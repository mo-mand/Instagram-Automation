name: Deploy Backend to Azure

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: backend
        run: npm install

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Build TypeScript
        working-directory: backend
        run: npm run build

      - name: Prepare deployment package
        run: |
          mkdir -p deploy
          cp -r backend/dist/* deploy/
          cp backend/package.json deploy/
          cp backend/startup.sh deploy/
          cp -r backend/node_modules deploy/node_modules
          echo "Deploy package size:"
          du -sh deploy/

      - name: Zip deployment package
        run: zip -r deploy.zip deploy/

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy via Azure CLI
        run: az webapp deploy --resource-group instagram-automation-rg --name instagram-automation-backend --src-path deploy.zip --type zip --async false

      - name: Restart app
        run: az webapp restart --resource-group instagram-automation-rg --name instagram-automation-backend
