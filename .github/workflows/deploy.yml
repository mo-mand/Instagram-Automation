name: Deploy Backend to Azure

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: backend
        run: npm install

      - name: Build TypeScript
        working-directory: backend
        run: npm run build

      - name: Zip deployment package
        run: |
          mkdir -p deploy
          cp backend/dist/index.js deploy/
          cp backend/startup.sh deploy/
          cd deploy
          zip -r ../deploy.zip .
          echo "Zip size: $(du -sh ../deploy.zip)"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy via Azure CLI
        run: az webapp deploy --resource-group instagram-automation-rg --name instagram-automation-backend --src-path deploy.zip --type zip --async false

      - name: Restart app
        run: az webapp restart --resource-group instagram-automation-rg --name instagram-automation-backend
